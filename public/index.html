<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.png" />
  <title>BB Twitter</title>
  <style>
    html, body, #root { height: 100%; margin: 0; overflow: hidden; }
    #root > div { height: 100%; display: flex; flex-direction: column; }
    [data-type="list-item"], [data-type="action-item"], [data-type="message"] { cursor: pointer; }
    /* Theme-aware CSS variables */
    :root {
      --focus-outline: rgba(18, 100, 163, 0.8);
      --focus-bg: rgba(18, 100, 163, 0.12);
    }
    [data-theme="light"] {
      --focus-outline: rgba(18, 100, 163, 1);
      --focus-bg: rgba(18, 100, 163, 0.18);
    }
    /* Focus styles for keyboard/trackpad navigation */
    [data-type]:focus { outline: 2px solid var(--focus-outline); outline-offset: -2px; }
    [data-type="list-item"]:focus, [data-type="message"]:focus, [data-type="action-item"]:focus { background-color: var(--focus-bg); }
    [data-type="icon-btn"]:focus, [data-type="header-btn"]:focus { border-radius: 4px; }
    [data-type="emoji-item"]:focus { border-radius: 6px; }
    [data-type="tab-btn"]:focus { outline-offset: -3px; }
    [data-type="overlay"]:focus { outline: none; }
    input:focus, textarea:focus { outline: 2px solid var(--focus-outline); outline-offset: -2px; }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
